<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden - CareMax Staff Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1E5AA8;
            --background: #0F172A;
            --card-bg: #111827;
            --border-color: #1F2937;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }
        body {
            background-color: var(--background);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .error-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .error-icon {
            color: #ef4444; /* red */
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn-primary {
            background-color: var(--primary-blue);
            border: none;
            padding: 12px 24px;
            font-weight: 500;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary:hover {
            background-color: #154585;
            color: white;
        }
    </style>
</head>
<body>

<div class="error-card">
    <i class="fa-solid fa-shield-halved error-icon"></i>
    <h1>Access Denied</h1>
    <p>Sorry, you do not have the required permissions to access this page. If you believe this is an error, please contact your system administrator.</p>
    <a href="/portal/" class="btn-primary"><i class="fa-solid fa-arrow-left me-2"></i> Return to Dashboard</a>
</div>

</body>
</html>
