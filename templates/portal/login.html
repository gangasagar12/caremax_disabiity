<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareMax Staff Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1E5AA8;
            --background: #0F172A;
            --card-bg: #111827;
            --border-color: #1F2937;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }
        body {
            background-color: var(--background);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .portal-brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .portal-brand i {
            color: var(--primary-blue);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .portal-brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }
        .portal-brand p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .form-control {
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px;
        }
        .form-control:focus {
            background-color: rgba(255,255,255,0.08);
            border-color: var(--primary-blue);
            color: var(--text-main);
            box-shadow: none;
        }
        .btn-primary {
            background-color: var(--primary-blue);
            border: none;
            padding: 12px;
            font-weight: 500;
            width: 100%;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background-color: #154585;
        }
        .form-check-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .forgot-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="portal-brand">
        <i class="fa-solid fa-hands-holding-child"></i>
        <h1>CareMax Operations</h1>
        <p>Secure access for authorized CareMax staff.</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger" role="alert" style="background-color: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #F8FAFC;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'portal:login' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="username" class="form-label" style="color: var(--text-muted); font-size: 0.9rem;">Username</label>
            <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
        </div>
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label for="password" class="form-label mb-0" style="color: var(--text-muted); font-size: 0.9rem;">Password</label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
            <div class="position-relative">
                <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" style="padding-right: 40px;">
                <i class="fa-regular fa-eye" id="togglePassword" style="position: absolute; top: 50%; right: 15px; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
            </div>
        </div>
        <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
            <label class="form-check-label" for="remember_me">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
